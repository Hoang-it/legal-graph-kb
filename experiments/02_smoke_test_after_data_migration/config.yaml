name: "Smoke test sau khi migrate data/ → data/graph/ + data/ontology/"
description: |
  Mục tiêu: verify hệ thống vẫn chạy đúng sau khi refactor folder data/.
  KHÔNG phải experiment khoa học — chỉ là smoke test 5 records để chắc
  chắn cả 5 arm gọi LLM API thật và Prolog solver thật, không bị broken
  bởi đợt rename gần đây (data/raw → data/graph/raw, data/ontology/, etc.).

  Pass criteria: tất cả 5 arm sinh được 5 record/arm, mỗi record có
  prompt_tokens > 0 (LLM call real), và logic_lm arms có prolog_program
  non-empty (Prolog call real).

date: "2026-05-29"

dataset:
  questions: data/eval/questions_200.json
  n: 5

parent: null

prompts_override_dir: null

arms:
  graphrag:                { mode: run, model: gpt-4o-mini }
  llm_only:                { mode: run, model: gpt-4o-mini }
  logic_lm_no_retrieval:   { mode: run, model: gpt-4o-mini }
  logic_lm_ontology:       { mode: run, model: gpt-4o-mini }
  logic_lm_graphrag:       { mode: run, model: gpt-4o-mini }

multimodel: null
