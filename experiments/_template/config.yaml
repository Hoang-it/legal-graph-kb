# Experiment config template — copy this folder, rename to NN_short_name,
# fill out every field. See ../../CONTRACT.md for the full shared contract.
#
# Two families (set `family` below):
#   qa         — driven by `python -m eval_core run|metrics` (generic engine,
#                config-only; fill `arms` / `multimodel`).
#   retrieval  — driven by a per-experiment pair scripts/expNN_run.py (Tier-1,
#                online) + scripts/expNN_metrics.py (Tier-2, offline). Leave
#                `arms: {}` and point `recompute` at the metrics module.

name: "Short human-readable title"
description: |
  What hypothesis does this experiment test? What's new vs the parent?
  Why is this worth running?

date: "YYYY-MM-DD"

# REQUIRED by the contract: qa | retrieval. Used by expkit to pick the right
# metric adapter + leaderboard. (Legacy folders without this field fall back to
# inferring the family from the metrics JSON shape, but new experiments MUST
# declare it explicitly.)
family: qa

# Dataset paths are relative to repo root and must already exist on disk.
dataset:
  questions: data/eval/questions_200.json
  n: null                                  # null = full dataset

# Single parent experiment (folder name, sibling under experiments/). The
# inheritance chain is walked when an arm's mode is 'inherit'. Cycles are
# detected; depth capped at 10.
parent: null

# Optional per-experiment prompt overrides. Path is relative to this
# experiment folder. When set, the value is exported as
# LEGAL_KG_PROMPTS_DIR for the duration of every CLI command — the
# loader in src.prompts checks override paths first, falls back to
# the canonical prompts/ tree.
prompts_override_dir: null

# How to regenerate metrics/academic_metrics.json from results/ OFFLINE
# (Tier-2). Read by `expkit --recompute` and `experiment_contract validate`.
#   qa        -> `eval_core`  (default; runs `python -m eval_core metrics <exp>`)
#   retrieval -> the metrics module, e.g. `scripts.exp15_metrics`
# Omit to use the family default (qa -> eval_core; retrieval -> scripts.expNN_metrics
# inferred from the folder number). Examples:
#   recompute: eval_core
#   recompute: scripts.exp15_metrics
#   recompute: { command: [python, -m, scripts.exp15_metrics, --full] }
recompute: eval_core

# Single-model arms (qa family). Each entry chooses how its records are made.
# - mode: run     — `python -m eval_core run` produces records here.
# - mode: inherit — records come from the parent's results/<arm>/.
# Retrieval family: leave this empty (`arms: {}`) — records come from expNN_run.py.
arms: {}
  # Example (qa):
  # graphrag:                { mode: run, model: gpt-4o-mini }
  # llm_only:                { mode: inherit }
  # logic_lm_no_retrieval:   { mode: run, model: gpt-4o-mini }
  # logic_lm_ontology:       { mode: inherit }
  # logic_lm_graphrag:       { mode: inherit }

# Optional multi-model matrix (qa family). Each (arm, model) pair becomes a
# combo under results/multimodel/<arm>__<model_safe>/. Combos always live in
# this experiment — no inheritance for multimodel today.
multimodel: null
  # Example:
  # arms:   [logic_lm_graphrag, logic_lm_no_retrieval]
  # models: ["gpt-4.1", "gpt-4o", "gpt-5-mini"]
