name: "HyDE2 retrieval — grounded iterative hypothetical doc, 3-arm dense-side A/B/C"
description: |
  Tests retrieval-grounded iterative HyDE (HyDE2). Pass 1 of dense
  BGE-M3+LoRA retrieval feeds the top-5 actual clauses into a
  conditional LLM prompt; the LLM generates a hypothetical doc that
  uses the BHXH vocabulary present in those clauses; pass 2 of dense
  retrieval embeds that grounded doc to produce the final article
  list.

  Hypothesis (plan §1): standard HyDE (exp 08 `dense_hyde`) plateaus
  because the LLM has to guess BHXH vocabulary blind from the
  question alone. Grounding round-2 generation on real clauses
  should align hypothetical-doc vocabulary with the corpus and lift
  dense ranking further (R@12 / NDCG@12 / R-Prec in_corpus).

  Three arms — all retrieval-only at article granularity:

    dense          → V5RetrievalPipeline.retrieve_dense_only
                     (BGE-M3 LoRA + clause_vec_tuned, dense_k=100)
    dense_hyde     → V5RetrievalPipeline.retrieve_dense_only_hyde
                     (HyDE1 — exp 08 baseline arm)
    dense_hyde2    → V5RetrievalPipeline.retrieve_dense_only_hyde2
                     (HyDE2 — grounded, seed_k=5, then dense top-100)

  Both `dense` and `dense_hyde` arms reuse the exp 08 records via the
  runner's idempotent skip-when-on-disk behaviour (see
  scripts/exp09_run.py). The eval_core CLI is not used (arms: {} is
  intentional, mirrors exp 08).

  HyDE2 generation uses prompts/runtime/hyde_generate_grounded.md and
  caches to artifacts/hyde2/openai__gpt-4o-mini/ keyed by
  sha256(question | prompt_sha | n | model | max_tokens | temperature |
  sorted(seed_clause_ids)). Changing the BGE-M3 LoRA OR the dense
  index invalidates HyDE2 cache automatically because seed clause IDs
  shift.

  Pre-flight cost (plan §7): ~$0.14 cold for full 200 (1 LLM call/Q
  × $0.0007 per call). Pilot 50 ~$0.035. Cap enforced: $0.50.

  Stratified 50-question pilot uses the SAME stt list as exp 08
  (experiments/08_hyde_retrieval/pilot_50_stt.json, seed=0) so the
  HyDE1-vs-HyDE2 head-to-head is on identical strata.

