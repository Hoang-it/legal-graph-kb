name: "Initial evaluation — R1 single-model + R2 multi-model"
description: |
  Snapshot of the first full evaluation that established the project's
  baseline numbers before any v5 retrieval work.

  R1: 5 single-model arms × 200 BHXH questions × gpt-4o-mini.
  R2: 2 logic-LM arms × 4 OpenAI models × 200 questions (multimodel matrix).

  Records committed to git so future experiments can `parent: 01_initial_eval`
  and `mode: inherit` for these arms without re-running the API calls.

date: "2026-05-29"

dataset:
  questions: data/eval/questions_200.json
  n: 200

parent: null

prompts_override_dir: null

arms:
  graphrag:                { mode: run, model: gpt-4o-mini }
  llm_only:                { mode: run, model: gpt-4o-mini }
  logic_lm_no_retrieval:   { mode: run, model: gpt-4o-mini }
  logic_lm_ontology:       { mode: run, model: gpt-4o-mini }
  logic_lm_graphrag:       { mode: run, model: gpt-4o-mini }

multimodel:
  arms:   [logic_lm_no_retrieval, logic_lm_graphrag]
  models: ["gpt-4.1", "gpt-4o", "gpt-5-mini"]
