name: "HyDE — GRACE-R prompt rewrite, full 200 head-to-head vs exp 09 baselines"
description: |
  Tests whether rewriting hyde_generate.md + hyde_generate_grounded.md
  under the GRACE-R framework (Grounding / Role+Scope / Authority /
  Citation / Examples / Refusal) lifts retrieval metrics vs the
  baselines frozen at exp 08 (HyDE1) + exp 09 (HyDE2).

  GRACE-R changes applied to both prompts:
    G — Grounding contract: separate user-question facts from training
        knowledge; user facts are inputs, not legal sources.
    R — Role broadened from "chuyên gia BHXH" → "trợ lý pháp luật VN";
        scope made dynamic (no specific law named in role).
    A — Authority hierarchy: N/A for HyDE (no citation emitted).
    C — Citation protocol: N/A for HyDE (citations forbidden).
    E — Examples balanced + abstract: 3 ĐÚNG covering 3 different
        topics (eligibility / HĐLĐ / an toàn lao động), negative
        examples are pattern-level (not instance-level — no sticky
        names like "bà Châu" / "Long An").
    R — Refusal path: if the question's domain isn't clear, write a
        general legal-style passage; do NOT fabricate a specific rule.

  Plus 3 HyDE-specific design changes (orthogonal to GRACE-R, called
  out separately so the ablation contribution is auditable):
    L1 — Length 200–400 từ → 80–150 từ (closer to real clause length).
    L2 — Allow keeping domain-specific keywords from the question
         (e.g. "độc hại", "thử việc", "cộng tác viên") to anchor
         dense retrieval; strip only PII (name / địa danh / age /
         date / money / percent).
    L3 — Grounded prompt: resolve the "use context vocabulary but
         don't copy" contradiction by permitting phrase-level reuse
         (≤5 từ contiguous) while forbidding sentence-level copy.
         Plus explicit instruction for multi-domain seed sets.

  Three arms — all retrieval-only at article granularity (same as exp 09):

    dense          → V5RetrievalPipeline.retrieve_dense_only
                     (BGE-M3 LoRA + clause_vec_tuned, dense_k=100,
                     raw question — deterministic, no LLM)
    dense_hyde     → V5RetrievalPipeline.retrieve_dense_only_hyde
                     (HyDE1 with GRACE-R prompt override)
    dense_hyde2    → V5RetrievalPipeline.retrieve_dense_only_hyde2
                     (HyDE2 with GRACE-R grounded prompt override,
                     same seed_k=5 as exp 09)

  Prompts overridden via prompts_override_dir → LEGAL_KG_PROMPTS_DIR.
  Cache keys include prompt_sha → new prompts produce fresh cache
  entries; the exp 08/09 caches under artifacts/hyde/ + artifacts/hyde2/
  are untouched.

  Pre-flight cost estimate (full 200, all cold):
    HyDE1 (GRACE-R) — 200 × $0.0005 = $0.10
    HyDE2 (GRACE-R) — 200 × $0.0007 = $0.14
    Total          — ~$0.24
  Cap enforced: $0.50 (matches exp 09).

  Records produced by scripts/exp10_run.py (clone of exp09_run.py with
  EXP_DIR + LEGAL_KG_PROMPTS_DIR injected). Metrics by
  scripts/exp10_metrics.py (clone of exp09_metrics.py). eval_core CLI
  is not used for this retrieval-only audit (arms: {} below mirrors
  exp 08/09).

date: "2026-05-31"

