name: "exp13 — Semantic-grounded HyDE (concept frame, no dense seed)"
description: |
  Retrieval-only audit. Tests whether grounding the HyDE hypothetical
  doc on a BHXH **concept frame** (query → concepts + KG entities from
  data/ontology/ontology_kg_full.json, NO dense clause seed) beats plain
  HyDE1 — where grounding on clause TEXT from a dense seed (exp 09 /
  HyDE2) regressed because the raw-question dense seed was domain-noisy.

  Tuned stack (BGE-M3 LoRA + clause_vec_tuned), same as exp 08/09, so
  numbers are comparable. Headline stratum = in_corpus.

  Arms (retrieval-only, article granularity):
    dense               → V5RetrievalPipeline.retrieve_dense_only (raw)
    dense_hyde          → retrieve_dense_only_hyde (HyDE1) — the bar
    dense_hyde_semantic → retrieve_dense_only_hyde_semantic (NEW)

  Concept frame: runtime/retrievers/semantic_context.py. Generator:
  OpenAISemanticHydeGenerator (gpt-4o-mini, n=1, max_tokens=700, T=0,
  prompt prompts/runtime/hyde_generate_semantic.md, cache
  artifacts/hyde_semantic/). HyDE1 reuses artifacts/hyde/ (cache from
  exp 08 → $0). Pilot-50 reuses exp 08's stratified list.

  Pre-registered bar (plan §8): beat HyDE1 (in_corpus 0.4736 R@12 /
  0.1326 R-Prec). The original recall@5>0.6 / precision@2>0.8 were
  retired after the 2026-06-01 feasibility analysis (precision@2 ceiling
  0.7575; 38% of gold mentions in un-indexed laws). See plan §0.

  Runner:  python -m scripts.exp13_run --pilot-50
  Metrics: python -m scripts.exp13_metrics

date: "2026-06-01"

