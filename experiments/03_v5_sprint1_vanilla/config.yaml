name: "v5 Sprint 1 — vanilla hybrid retrieval (30-probe)"
description: |
  Plan v5 Sprint 1 baseline.

  Pipeline = M1 indexing (sẵn) + M4 hybrid (BGE-M3 dense + Lucene BM25 +
  temporal filter + RRF fusion) + M5 rerank (BGE-reranker-v2-m3) +
  REFERS_TO 2-3 hop expansion + re-rerank + GPT-4o-mini generator.

  Mục tiêu: lấy baseline recall/precision của vanilla pipeline trên 30-probe
  để quyết định Sprint 2 (M2 fine-tune / M3 HyDE / M6 verifier).

  Đối chiếu: arm graphrag ở 01_initial_eval (recall=0.129 macro / 0.0875 micro).

date: "2026-05-29"

dataset:
  questions: data/eval/questions_200.json
  n: 30                          # 30-probe only — full 150-test deferred to Sprint 3

parent: 01_initial_eval          # inherit baselines for A/B

prompts_override_dir: null

arms:
  graphrag_v5:           { mode: run, model: gpt-4o-mini }   # NEW arm under test
  graphrag:              { mode: inherit }                   # baseline A/B
  llm_only:              { mode: inherit }                   # control

multimodel: null
