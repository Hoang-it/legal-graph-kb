name: "exp 12 — HyDE × CypherWalk 2×2 (retrieval-only)"
description: |
  Follow-on to exp 11. exp 11 found CypherWalkRetriever LOSES vs vanilla
  dense (recall@12 −0.0417) because the LLM Cypher walk surfaces new clauses
  that carry no gold. The walk seeds from a raw-question vector search; this
  experiment asks whether a BETTER seed (HyDE hypothetical-doc embedding)
  changes that.

  2×2 factorial — seed {raw, hyde} × walk {off, on} — ALL on the same vanilla
  RagPipeline / clause_vec stack as exp 11 (NOT the v5 tuned index of exp 08),
  so the HyDE effect is isolated:

    dense_vanilla      raw seed, top-12, no walk      (= exp 11 baseline)
    dense_hyde         HyDE seed, top-12, no walk
    cypher_walk        raw seed (8) + walk → RRF 12   (= exp 11 arm)
    cypher_walk_hyde   HyDE seed (8) + walk → RRF 12  ← NEW combined arm

  HyDE: OpenAI gpt-4o-mini, n=1, max_tokens=700, T=0, prompt
  runtime/hyde_generate.md — identical to exp 08 so its disk cache is reused.

  Metric granularity: ARTICLE (0/200 gold cites are clause-level — same
  limitation as exp 11). Retrieval-only: no answer gen, no BERTScore, no
  citation parsing. Same 50-question pilot subset as exp 11.

  eval_core CLI NOT used (arms: {} intentional). Records: scripts/exp12_run.py;
  metrics: scripts/exp12_metrics.py.

date: "2026-06-01"

dataset:
  questions: data/eval/questions_200.json
  n: 50

