name: "exp 11 (REDO) — CypherWalkRetriever retrieval-only audit"
description: |
  Retrieval-only audit of the new ``CypherWalkRetriever`` — a retrieval-LAYER
  component (peer of RagPipeline.vector_search / V5RetrievalPipeline), NOT an
  E2E arm. Supersedes the mis-built ``graphrag_cypher`` E2E arm shipped in
  commit a10f609 (see README "Deprecation").

  Plan: docs/plans/exp11_cypher_walk_retriever.md.

  Question this experiment answers: when the LLM is *forced to traverse the
  graph OUTWARD from the vector seed* (forbidding the seed-pin pattern that
  made the previous attempt surface 0 new clauses), does it move new gold
  articles into the retrieved set vs vanilla dense / dense+expand?

  Three retrieval-only arms (NO answer generation, NO BERTScore, NO citation
  parsing) — all built on the vanilla ``clause_vec`` dense channel so the
  comparison pulls in no v5 changes (plan §5.2):

    dense_vanilla      → RagPipeline.vector_search(top_k=12). Baseline.
    dense_then_expand  → vector_search(top_k=12) + RagPipeline.expand
                         REFERENCES/CITES_EXTERNAL refs folded in (article-
                         level) — vanilla graphrag's retrieval side, no LLM.
    cypher_walk        → CypherWalkRetriever.retrieve (vector seed → LLM
                         outward Cypher walk → fallback expand → RRF k=60).

  Metric granularity: ARTICLE. Clause-level recall is NOT reported — the
  200-question gold carries 0 khoản-level citations (gold_items ==
  gold_articles); see README "Honest limitations".

  Scope: 50-question pilot stratified by L41 presence (l41_only /
  mixed_l41_other / no_l41), persisted at pilot_50_stt.json, then full 200
  if the pilot signals are useful (plan §5.4). Only cypher_walk calls OpenAI
  (gpt-4o-mini); worst-case ~$0.075 for the pilot. Cost cap enforced in the
  runner (--cost-cap, default $0.50).

  eval_core CLI is NOT used for this retrieval-only audit (so ``arms: {}``
  below is intentional, matching exp 06/07/08). Records produced by
  scripts/exp11_run.py; metrics by scripts/exp11_metrics.py; funnel by
  scripts/exp11_funnel.py.

date: "2026-06-01"

dataset:
  questions: data/eval/questions_200.json
  n: 50

parent: null

prompts_override_dir: null

# Retrieval-only audit — eval_core arm runners are not applicable.
# Metrics are computed by scripts/exp11_metrics.py.
arms: {}

