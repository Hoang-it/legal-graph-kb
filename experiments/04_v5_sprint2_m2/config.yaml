name: "v5 Sprint 2 M2 — BGE-M3 LoRA fine-tune + bge-reranker-base (30-probe)"
description: |
  Phase 4 của v5 Sprint 2.

  Pipeline = M2 fine-tuned BGE-M3 dense + Lucene BM25 sparse + temporal filter +
  RRF + bge-reranker-base rerank + REFERS_TO graph hop + GPT-4o-mini generator.

  M2 (BGE-M3 LoRA r=8, alpha=32, 10 epochs trên synthetic data v2) đã train
  trên Colab T4. Style-aligned synthetic Q (mean 62 từ, formal "Ông X (TP)
  hỏi" + personal narrative — match dev distribution).

  Dense-only A/B retrieval@10 trên 39 dev câu: vanilla 0.387 vs tuned 0.383
  (Δ -1.1%, trong noise range cho n=39).

  Phase 4 dùng E2E citation recall trên 30-probe để quyết định gate
  per plan §3 (M2 vs vanilla v5 vs graphrag baseline).

  Reranker SWAP gộp luôn vào arm M2 (per design session decision):
  bge-reranker-v2-m3 → bge-reranker-base (giảm latency ~2.5×, trade 4% NDCG).

date: "2026-05-30"

dataset:
  questions: data/eval/questions_200.json
  n: 30                          # same-30-stt với Sprint 1 để A/B trực tiếp

parent: 03_v5_sprint1_vanilla    # inherit baselines for direct A/B

prompts_override_dir: null

arms:
  graphrag_v5_m2:        { mode: run, model: gpt-4o-mini }   # NEW arm — M2 + reranker-base
  graphrag_v5:           { mode: inherit }                   # Sprint 1 vanilla v5
  graphrag:              { mode: inherit }                   # Sprint 1 graphrag baseline
  llm_only:              { mode: inherit }                   # Sprint 1 control

multimodel: null
